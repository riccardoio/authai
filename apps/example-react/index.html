<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthAI demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface-muted: #fafafa;
        --surface-soft: #f5f5f5;
        --border: #eeeeee;
        --border-strong: #e5e5e5;
        --border-darker: #d4d4d4;

        --text-primary: #171717;
        --text-body: #404040;
        --text-muted: #525252;
        --text-subtle: #737373;
        --text-faint: #a3a3a3;
        --text-ghost: #c4c4c4;

        --accent: #1d4dff;
        --error: #b91c1c;

        --font-ui: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

        --dur-micro: 140ms;
        --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: var(--font-ui);
        font-size: 15px;
        line-height: 1.55;
        letter-spacing: -0.005em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      h1, h2, h3, h4 {
        letter-spacing: -0.02em;
        font-weight: 500;
        color: var(--text-primary);
        margin: 0;
      }

      a { color: inherit; }

      ::selection {
        background: #eaeefb;
        color: var(--accent);
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
      }
      .brand { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
      .topbar-meta {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-faint);
      }
      .topbar-meta strong {
        color: var(--text-primary);
        font-weight: 500;
        letter-spacing: 0.04em;
      }

      .container {
        width: 100%;
        max-width: 680px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      /* === Light landing (signed-out) — Vercel-style hero. === */
      .landing {
        min-height: 100vh;
        background: #ffffff;
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }
      .landing::before {
        content: "";
        position: absolute;
        inset: -20% -20% auto -20%;
        height: 760px;
        background:
          radial-gradient(ellipse at 22% 18%, rgba(57, 255, 20, 0.28), transparent 55%),
          radial-gradient(ellipse at 78% 32%, rgba(0, 255, 136, 0.20), transparent 60%);
        filter: blur(70px);
        z-index: -1;
        pointer-events: none;
      }
      .landing::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, rgba(0, 0, 0, 0.035) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.035) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(ellipse at center top, #000 30%, transparent 75%);
        -webkit-mask-image: radial-gradient(ellipse at center top, #000 30%, transparent 75%);
        z-index: -1;
        pointer-events: none;
      }
      .landing-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px;
        position: relative;
        z-index: 1;
        background: transparent;
      }
      .landing-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: -0.01em;
        color: var(--text-primary);
      }
      .landing-brand-mark {
        display: inline-flex;
        width: 22px;
        height: 22px;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
      }
      .landing-nav {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .landing-nav a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        color: var(--text-subtle);
        font-size: 13px;
        text-decoration: none;
        border-radius: 8px;
        transition: color var(--dur-micro) var(--ease-standard),
          background var(--dur-micro) var(--ease-standard);
      }
      .landing-nav a:hover {
        color: var(--text-primary);
        background: var(--surface-muted);
      }
      .landing-theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 9999px;
        background: transparent;
        border: 1px solid var(--border-strong);
        color: var(--text-subtle);
        cursor: pointer;
        margin-left: 6px;
        transition: color var(--dur-micro) var(--ease-standard),
          background var(--dur-micro) var(--ease-standard),
          border-color var(--dur-micro) var(--ease-standard);
      }
      .landing-theme-toggle:hover {
        color: var(--text-primary);
        background: var(--surface-muted);
        border-color: var(--border-darker);
      }

      /* === Dark variant of the landing. === */
      .landing[data-theme="dark"] {
        background: #0a0a0a;
        color: #ededed;
      }
      .landing[data-theme="dark"]::before {
        background:
          radial-gradient(circle at 28% 18%, rgba(0, 255, 136, 0.55), transparent 38%),
          radial-gradient(circle at 72% 25%, rgba(0, 255, 136, 0.42), transparent 42%);
        filter: blur(36px);
        mix-blend-mode: screen;
      }
      .landing[data-theme="dark"]::after {
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      }
      .landing[data-theme="dark"] .landing-brand,
      .landing[data-theme="dark"] .landing-brand-mark {
        color: #fff;
      }
      .landing[data-theme="dark"] .landing-nav a {
        color: rgba(255, 255, 255, 0.6);
      }
      .landing[data-theme="dark"] .landing-nav a:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }
      .landing[data-theme="dark"] .landing-theme-toggle {
        border-color: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.7);
      }
      .landing[data-theme="dark"] .landing-theme-toggle:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.25);
      }
      .landing[data-theme="dark"] .landing-eyebrow {
        color: rgba(255, 255, 255, 0.6);
        border-color: rgba(255, 255, 255, 0.14);
      }
      .landing[data-theme="dark"] .landing-headline,
      .landing[data-theme="dark"] .landing-headline em {
        color: #fff;
      }
      .landing[data-theme="dark"] .landing-sub {
        color: rgba(255, 255, 255, 0.6);
      }
      .landing[data-theme="dark"] .landing-btn-primary {
        background: #fff;
        color: #0a0a0a;
        box-shadow: none;
      }
      .landing[data-theme="dark"] .landing-btn-primary:hover {
        filter: brightness(0.92);
      }
      .landing[data-theme="dark"] .landing-btn-ghost {
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        border-color: rgba(255, 255, 255, 0.14);
      }
      .landing[data-theme="dark"] .landing-btn-ghost:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.25);
      }
      .landing[data-theme="dark"] .landing-preset {
        color: rgba(255, 255, 255, 0.42);
      }
      .landing[data-theme="dark"] .landing-preset button {
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
        border-color: rgba(255, 255, 255, 0.14);
      }
      .landing[data-theme="dark"] .landing-preset button:hover {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border-color: rgba(255, 255, 255, 0.25);
      }
      .landing[data-theme="dark"] .landing-code {
        border-color: rgba(255, 255, 255, 0.08);
      }
      .landing[data-theme="dark"] .landing-footer {
        color: rgba(255, 255, 255, 0.35);
      }

      .landing-hero {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 72px;
        align-items: start;
        padding: 80px 40px 64px;
        max-width: 1240px;
        width: 100%;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }
      .landing-hero-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
      }
      @media (max-width: 960px) {
        .landing-hero {
          grid-template-columns: 1fr;
          gap: 56px;
          padding: 72px 24px 48px;
        }
        .landing-hero-text { align-items: flex-start; text-align: left; }
      }
      .landing-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-subtle);
        padding: 6px 14px;
        border: 1px solid var(--border-strong);
        border-radius: 9999px;
        background: transparent;
        margin-bottom: 28px;
      }
      .landing-eyebrow .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #00ff88;
        box-shadow: 0 0 10px rgba(57, 255, 20, 0.85);
      }
      .landing-headline {
        font-size: clamp(36px, 4.5vw, 60px);
        font-weight: 500;
        line-height: 1.04;
        letter-spacing: -0.035em;
        color: var(--text-primary);
        margin: 0;
        max-width: 14ch;
      }
      .landing-headline em {
        font-style: normal;
        color: var(--text-primary);
      }
      .landing-sub {
        max-width: 480px;
        font-size: 16px;
        line-height: 1.55;
        color: var(--text-subtle);
        margin: 24px 0 0;
        letter-spacing: -0.005em;
      }
      .landing-chip {
        font-family: var(--font-mono);
        font-size: 0.94em;
        padding: 1px 6px;
        border-radius: 6px;
        background: var(--surface-muted);
        border: 1px solid var(--border);
        color: var(--text-primary);
      }
      .landing[data-theme="dark"] .landing-chip {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.14);
        color: #fff;
      }

      .landing-cta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: flex-start;
        margin-top: 36px;
      }
      .landing-btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 44px;
        padding: 0 22px;
        border-radius: 9999px;
        background: linear-gradient(180deg, #262626 0%, #0a0a0a 100%);
        color: #fff;
        font-family: var(--font-ui);
        font-size: 14px;
        font-weight: 500;
        border: 0;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 1px 2px rgba(0, 0, 0, 0.10),
          0 4px 12px rgba(0, 0, 0, 0.06);
        transition: filter var(--dur-micro) var(--ease-standard),
          transform var(--dur-micro) var(--ease-standard),
          box-shadow var(--dur-micro) var(--ease-standard);
      }
      .landing-btn-primary:hover {
        filter: brightness(1.12);
        transform: translateY(-1px);
      }
      .landing-btn-primary:active { transform: translateY(0); }
      .landing-btn-primary svg { transition: transform var(--dur-micro) var(--ease-standard); }
      .landing-btn-primary:hover svg { transform: translateX(2px); }

      .landing-btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 44px;
        padding: 0 22px;
        border-radius: 9999px;
        background: #fff;
        color: var(--text-body);
        font-family: var(--font-ui);
        font-size: 14px;
        font-weight: 500;
        border: 1px solid var(--border-strong);
        cursor: pointer;
        text-decoration: none;
        transition: background var(--dur-micro) var(--ease-standard),
          border-color var(--dur-micro) var(--ease-standard),
          color var(--dur-micro) var(--ease-standard);
      }
      .landing-btn-ghost:hover {
        background: var(--surface-muted);
        border-color: var(--border-darker);
        color: var(--text-primary);
      }

      .landing-preset {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        color: var(--text-faint);
        font-size: 12px;
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .landing-preset-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-start;
      }
      .landing-preset button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 0 14px;
        border-radius: 9999px;
        background: #fff;
        color: var(--text-body);
        font-family: var(--font-ui);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0;
        text-transform: none;
        border: 1px solid var(--border-strong);
        cursor: pointer;
        transition: background var(--dur-micro) var(--ease-standard),
          color var(--dur-micro) var(--ease-standard),
          border-color var(--dur-micro) var(--ease-standard);
      }
      .landing-preset button:hover {
        background: var(--surface-muted);
        color: var(--text-primary);
        border-color: var(--border-darker);
      }

      /* Code block stays dark on light — Vercel-style focal point. */
      .landing-code {
        width: 100%;
        background: #0a0a0a;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.18),
          0 0 0 1px rgba(0, 0, 0, 0.02);
        position: relative;
        z-index: 1;
      }
      .landing-code-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        font-family: var(--font-mono);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.04em;
      }
      .landing-code-header .traffic {
        display: inline-flex;
        gap: 6px;
        margin-right: 4px;
      }
      .landing-code-header .traffic span {
        width: 10px; height: 10px; border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }
      .landing-code-tabs {
        display: flex;
        gap: 2px;
        margin-left: 4px;
      }
      .landing-code-tabs button {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.04em;
        padding: 6px 12px;
        background: transparent;
        color: rgba(255, 255, 255, 0.45);
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        transition: color var(--dur-micro) var(--ease-standard),
          background var(--dur-micro) var(--ease-standard);
      }
      .landing-code-tabs button:hover {
        color: rgba(255, 255, 255, 0.75);
      }
      .landing-code-tabs button[data-active="true"] {
        color: #ededed;
        background: rgba(255, 255, 255, 0.06);
      }
      .landing-code pre {
        margin: 0;
        padding: 22px 24px;
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.7;
        color: #ededed;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      .landing-code .kw { color: #a4c2ff; }
      .landing-code .str { color: #ffb480; }
      .landing-code .com { color: rgba(255, 255, 255, 0.35); font-style: italic; }
      .landing-code .fn { color: #c5b3ff; }
      .landing-code .var { color: #ededed; }
      .landing-code .punc { color: rgba(255, 255, 255, 0.5); }

      .landing-footer {
        padding: 48px 24px 32px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-faint);
        position: relative;
        z-index: 1;
      }

      .btn-primary {
        display: inline-flex;
        height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 9999px;
        background: linear-gradient(180deg, #262626 0%, #0a0a0a 100%);
        padding: 0 20px;
        font-family: var(--font-ui);
        font-size: 14px;
        font-weight: 500;
        letter-spacing: -0.005em;
        color: #fff;
        border: 0;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 1px 2px rgba(0, 0, 0, 0.1),
          0 4px 12px rgba(0, 0, 0, 0.06);
        transition: filter var(--dur-micro) var(--ease-standard),
          transform var(--dur-micro) var(--ease-standard);
      }
      .btn-primary:hover { filter: brightness(1.12); }
      .btn-primary:active { transform: translateY(1px); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

      .btn-light {
        display: inline-flex;
        height: 36px;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-radius: 9999px;
        background: #fff;
        border: 1px solid var(--border-strong);
        padding: 0 16px;
        font-family: var(--font-ui);
        font-size: 13px;
        font-weight: 500;
        color: var(--text-body);
        cursor: pointer;
        transition: background-color var(--dur-micro) var(--ease-standard),
          border-color var(--dur-micro) var(--ease-standard),
          transform var(--dur-micro) var(--ease-standard);
      }
      .btn-light:hover {
        background: var(--surface-muted);
        border-color: var(--border-darker);
        color: var(--text-primary);
      }
      .btn-light:active { transform: translateY(1px); }

      .btn-ghost {
        background: transparent;
        border: 0;
        color: var(--text-subtle);
        font-family: var(--font-ui);
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: color var(--dur-micro) var(--ease-standard);
      }
      .btn-ghost:hover { color: var(--text-primary); }

      .session-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .session-meta {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-faint);
      }
      .session-meta strong {
        color: var(--text-primary);
        font-weight: 500;
      }
      .model-select {
        font-family: var(--font-mono);
        font-size: 12px;
        background: #fff;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 6px 10px;
        color: var(--text-body);
        cursor: pointer;
        transition: border-color var(--dur-micro) var(--ease-standard);
      }
      .model-select:hover { border-color: var(--border-darker); }
      .model-select:focus-visible {
        outline: 2px solid var(--text-primary);
        outline-offset: 2px;
      }

      .transcript {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .turn-user { display: flex; justify-content: flex-end; }
      .turn-user .bubble {
        max-width: 520px;
        background: var(--text-primary);
        color: #fff;
        padding: 12px 18px;
        font-size: 14.5px;
        line-height: 1.7;
        letter-spacing: -0.006em;
        border-radius: 20px 20px 4px 20px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .turn-assistant {
        display: flex;
        justify-content: flex-start;
        animation: turn-in 320ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .turn-assistant .body {
        max-width: 560px;
        font-size: 14.5px;
        line-height: 1.75;
        letter-spacing: -0.005em;
        color: var(--text-body);
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .streaming-cursor {
        display: inline-block;
        width: 0.45ch;
        background-color: var(--text-primary);
        animation: cursor-blink 1s steps(2) infinite;
        vertical-align: text-bottom;
        height: 1.1em;
        margin-left: 1px;
        opacity: 0.7;
      }

      .thinking {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        padding: 4px 0;
      }
      .thinking span {
        display: block;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--text-faint);
        animation: thinking 1.4s infinite ease-in-out both;
      }
      .thinking span:nth-child(1) { animation-delay: -0.32s; }
      .thinking span:nth-child(2) { animation-delay: -0.16s; }

      .reply {
        margin-top: 32px;
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        background: #fff;
        border: 1px solid var(--border-strong);
        border-radius: 9999px;
        padding: 8px 8px 8px 22px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        transition: border-color var(--dur-micro) var(--ease-standard),
          box-shadow var(--dur-micro) var(--ease-standard);
      }
      .reply:focus-within {
        border-color: var(--border-darker);
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.03);
      }
      .reply textarea {
        flex: 1;
        min-width: 0;
        background: transparent;
        border: 0;
        outline: 0;
        resize: none;
        font-family: var(--font-ui);
        font-size: 15px;
        line-height: 1.55;
        color: var(--text-primary);
        padding: 8px 0;
        max-height: 168px;
      }
      .reply textarea::placeholder { color: var(--text-faint); }
      .send-btn {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 9999px;
        background: linear-gradient(180deg, #262626 0%, #0a0a0a 100%);
        color: #fff;
        border: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 1px 2px rgba(0, 0, 0, 0.12);
        transition: filter var(--dur-micro) var(--ease-standard),
          transform var(--dur-micro) var(--ease-standard),
          opacity var(--dur-micro) var(--ease-standard);
      }
      .send-btn:hover:not(:disabled) { filter: brightness(1.15); transform: scale(1.04); }
      .send-btn:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
      .send-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        filter: none;
        transform: none;
      }
      .send-btn svg {
        transition: transform 200ms var(--ease-standard);
      }

      .inline-error {
        color: var(--error);
        font-size: 13px;
        margin-top: 6px;
      }

      @keyframes turn-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes cursor-blink {
        50% { opacity: 0; }
      }
      @keyframes thinking {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
