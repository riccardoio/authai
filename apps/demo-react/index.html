<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthAI — Demo</title>
    <meta
      name="description"
      content="Try AuthAI: sign in with your ChatGPT, Grok, or Copilot plan and chat. Your tokens stay encrypted; the demo bills your subscription, never ours."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface-muted: #fafafa;
        --surface-soft: #f5f5f5;
        --border: #ececea;
        --border-strong: #e0dfdc;
        --border-darker: #d4d4d4;

        --text-primary: #0a0a0a;
        --text-body: #404040;
        --text-muted: #525252;
        --text-subtle: #737373;
        --text-faint: #a3a3a3;
        --text-ghost: #c4c4c4;

        --accent: #1d4dff;
        --error: #b91c1c;

        --font-ui: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

        --dur-micro: 140ms;
        --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      [data-theme="dark"] {
        --bg: #0a0a0a;
        --surface: #111111;
        --surface-muted: #161616;
        --surface-soft: #1c1c1c;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.14);
        --border-darker: rgba(255, 255, 255, 0.22);

        --text-primary: #fafafa;
        --text-body: #d4d4d4;
        --text-muted: #a3a3a3;
        --text-subtle: #8a8a8a;
        --text-faint: #6e6e6e;
        --text-ghost: #4a4a4a;

        --accent: #5aa6ff;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: var(--font-ui);
        font-size: 15px;
        line-height: 1.55;
        letter-spacing: -0.005em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      h1, h2, h3, h4 {
        letter-spacing: -0.02em;
        font-weight: 500;
        color: var(--text-primary);
        margin: 0;
      }

      a { color: inherit; }

      ::selection {
        background: rgba(29, 77, 255, 0.15);
        color: var(--accent);
      }

      /* === Sign-in screen === */

      .signin-screen {
        min-height: 100dvh;
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }

      .signin-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
      }
      .signin-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-primary);
        font-weight: 500;
        font-size: 13.5px;
        letter-spacing: -0.005em;
      }
      .signin-brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: var(--text-primary);
        color: var(--bg);
      }
      .signin-brand-text {
        color: var(--text-muted);
      }
      .signin-brand-link {
        color: var(--text-primary);
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color var(--dur-micro) var(--ease-standard);
      }
      .signin-brand-link:hover {
        border-bottom-color: var(--text-primary);
      }
      .signin-theme-toggle {
        background: transparent;
        border: 1px solid var(--border);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: color var(--dur-micro) var(--ease-standard),
          border-color var(--dur-micro) var(--ease-standard);
      }
      .signin-theme-toggle:hover {
        color: var(--text-primary);
        border-color: var(--border-strong);
      }

      .signin-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .signin-card {
        width: 100%;
        max-width: 440px;
        text-align: center;
      }
      .signin-headline {
        font-size: 32px;
        line-height: 1.15;
        letter-spacing: -0.025em;
        margin: 0 0 14px;
      }
      .signin-headline em {
        font-style: italic;
        color: var(--accent);
        font-weight: 500;
      }
      .signin-sub {
        color: var(--text-muted);
        font-size: 14.5px;
        line-height: 1.6;
        margin: 0 0 28px;
      }
      .signin-sub strong {
        color: var(--text-primary);
        font-weight: 500;
      }
      .signin-providers {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 24px;
      }
      .signin-providers > * {
        all: unset;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-strong);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text-primary);
        font-family: var(--font-ui);
        font-size: 14px;
        font-weight: 500;
        letter-spacing: -0.005em;
        cursor: pointer;
        transition: border-color var(--dur-micro) var(--ease-standard),
          background var(--dur-micro) var(--ease-standard),
          transform var(--dur-micro) var(--ease-standard);
        box-sizing: border-box;
      }
      .signin-providers > *:hover {
        border-color: var(--border-darker);
        background: var(--surface-muted);
      }
      .signin-providers > *:active {
        transform: translateY(1px);
      }
      .signin-providers svg {
        flex-shrink: 0;
        color: var(--text-primary);
      }
      .signin-footnote {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.04em;
        color: var(--text-faint);
        margin: 0;
      }
      .signin-footnote a {
        color: var(--text-subtle);
        text-decoration: none;
      }
      .signin-footnote a:hover {
        color: var(--text-primary);
      }

      /* === Chat shell (signed-in) === */

      .chat-shell {
        min-height: 100dvh;
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }
      .chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
      }
      .chat-brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--text-primary);
        font-weight: 500;
        font-size: 13px;
        letter-spacing: -0.005em;
      }
      .chat-brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background: var(--text-primary);
        color: var(--bg);
      }
      .chat-brand-text {
        color: var(--text-muted);
      }
      .chat-brand-link {
        color: var(--text-primary);
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color var(--dur-micro) var(--ease-standard);
      }
      .chat-brand-link:hover {
        border-bottom-color: var(--text-primary);
      }
      .chat-theme-toggle {
        background: transparent;
        border: 1px solid var(--border);
        width: 30px;
        height: 30px;
        border-radius: 8px;
        cursor: pointer;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: color var(--dur-micro) var(--ease-standard),
          border-color var(--dur-micro) var(--ease-standard);
      }
      .chat-theme-toggle:hover {
        color: var(--text-primary);
        border-color: var(--border-strong);
      }

      .chat-frame {
        flex: 1;
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 20px 32px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      /* === Chat internals — referenced by Chat.tsx, kept compatible === */

      .btn-ghost {
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-muted);
        font-family: var(--font-ui);
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: color var(--dur-micro) var(--ease-standard),
          border-color var(--dur-micro) var(--ease-standard);
      }
      .btn-ghost:hover {
        color: var(--text-primary);
        border-color: var(--border-strong);
      }

      .session-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }
      .session-meta {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-faint);
      }
      .session-meta strong {
        color: var(--text-primary);
        font-weight: 500;
        letter-spacing: 0.04em;
      }
      .model-select {
        appearance: none;
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 6px 28px 6px 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-body);
        cursor: pointer;
        background-image: linear-gradient(45deg, transparent 50%, var(--text-subtle) 50%),
          linear-gradient(135deg, var(--text-subtle) 50%, transparent 50%);
        background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
        background-size: 5px 5px;
        background-repeat: no-repeat;
        transition: border-color var(--dur-micro) var(--ease-standard);
      }
      .model-select:hover { border-color: var(--border-darker); }
      .model-select:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .transcript {
        flex: 1;
        overflow-y: auto;
        padding: 12px 4px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 0;
      }
      .turn-user { display: flex; justify-content: flex-end; }
      .turn-user .bubble {
        max-width: 76%;
        background: var(--surface-soft);
        border: 1px solid var(--border);
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 14.5px;
        line-height: 1.55;
        color: var(--text-primary);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .turn-assistant {
        display: flex;
        justify-content: flex-start;
      }
      .turn-assistant .body {
        max-width: 92%;
        font-size: 14.5px;
        line-height: 1.65;
        color: var(--text-primary);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .streaming-cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        margin-left: 2px;
        background: var(--text-primary);
        vertical-align: text-bottom;
        animation: blink 1s steps(2, end) infinite;
      }
      @keyframes blink { to { opacity: 0; } }

      .thinking {
        display: inline-flex;
        gap: 4px;
        padding: 4px 0;
      }
      .thinking span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-subtle);
        animation: thinking-bounce 1.2s ease-in-out infinite;
      }
      .thinking span:nth-child(1) { animation-delay: -0.32s; }
      .thinking span:nth-child(2) { animation-delay: -0.16s; }
      @keyframes thinking-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.6; }
        40% { transform: scale(1); opacity: 1; }
      }

      .reply {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 10px 12px;
        margin-top: 16px;
        border: 1px solid var(--border-strong);
        border-radius: 16px;
        background: var(--surface);
        transition: border-color var(--dur-micro) var(--ease-standard),
          box-shadow var(--dur-micro) var(--ease-standard);
      }
      .reply:focus-within {
        border-color: var(--border-darker);
        box-shadow: 0 0 0 3px rgba(29, 77, 255, 0.08);
      }
      .reply textarea {
        flex: 1;
        border: none;
        background: transparent;
        resize: none;
        outline: none;
        font-family: var(--font-ui);
        font-size: 14.5px;
        line-height: 1.5;
        color: var(--text-primary);
        padding: 6px 4px;
        max-height: 168px;
        overflow-y: auto;
      }
      .reply textarea::placeholder { color: var(--text-faint); }
      .send-btn {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        border-radius: 10px;
        border: none;
        background: var(--text-primary);
        color: var(--bg);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform var(--dur-micro) var(--ease-standard),
          filter var(--dur-micro) var(--ease-standard);
      }
      .send-btn:hover:not(:disabled) { filter: brightness(1.15); transform: scale(1.04); }
      .send-btn:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .send-btn svg {
        transition: transform var(--dur-micro) var(--ease-standard);
      }
      .inline-error {
        color: var(--error);
        font-size: 13px;
        margin: 12px 0 0;
        font-family: var(--font-mono);
      }
      [data-theme="dark"] .inline-error { color: #fca5a5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
